AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MSK Load Simulation Tool — Cognito User Pool Setup.
  Creates a Cognito User Pool with an admin user for authentication.

Parameters:
  AdminUsername:
    Type: String
    Default: admin
    Description: Username for the initial admin user
    MinLength: 3
    MaxLength: 64

  AdminPassword:
    Type: String
    NoEcho: true
    Description: Temporary password for the admin user (must meet complexity requirements)
    MinLength: 8
    MaxLength: 64

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: MSKLoadSimUserPool
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MSKLoadSimClient
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  AdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref AdminUsername
      TemporaryPassword: !Ref AdminPassword
      UserAttributes:
        - Name: email
          Value: !Sub '${AdminUsername}@msk-load-sim.local'
        - Name: email_verified
          Value: 'true'

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolArn'

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region
