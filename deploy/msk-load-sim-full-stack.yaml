AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MSK Load Simulation Tool — Full Application Stack.
  Deploys S3, CloudFront, API Gateway, Lambda (VPC), DynamoDB, and IAM roles.

Parameters:
  CognitoStackName:
    Type: String
    Default: MSKLoadSimCognito
    Description: Name of the Cognito setup stack

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where MSK cluster resides

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for Lambda functions (must have MSK access)

  MSKSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group that allows access to MSK cluster

Resources:
  # ============================================================
  # S3 + CloudFront (Static Web Hosting)
  # ============================================================
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'msk-load-sim-web-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: MSKLoadSimOAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        PriceClass: PriceClass_100


  # ============================================================
  # DynamoDB (Session State + Saved Templates)
  # ============================================================
  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MSKLoadSimSessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ============================================================
  # Lambda Security Group
  # ============================================================
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MSK Load Sim Lambda functions
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ============================================================
  # IAM Role for Lambda Functions
  # ============================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MSKLoadSimLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: MSKLoadSimLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                Resource: !GetAtt SessionTable.Arn
              - Effect: Allow
                Action:
                  - kafka-cluster:Connect
                  - kafka-cluster:DescribeCluster
                  - kafka-cluster:DescribeTopic
                  - kafka-cluster:CreateTopic
                  - kafka-cluster:WriteData
                  - kafka-cluster:ReadData
                  - kafka-cluster:AlterGroup
                  - kafka-cluster:DescribeGroup
                Resource: '*'
              - Effect: Allow
                Action:
                  - kafka:ListClustersV2
                  - kafka:DescribeCluster
                  - kafka:GetBootstrapBrokers
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'


  # ============================================================
  # Lambda Functions
  # ============================================================
  ControlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MSKLoadSim-Control
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          // Placeholder — deploy actual code via CI/CD
          exports.handler = async (event) => ({ statusCode: 200, body: '{}' });
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
          - !Ref MSKSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable

  ProducerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MSKLoadSim-Producer
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Code:
        ZipFile: |
          // Placeholder — deploy actual code via CI/CD
          exports.handler = async (event) => ({ statusCode: 200, body: '{}' });
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
          - !Ref MSKSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable

  ConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MSKLoadSim-Consumer
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Code:
        ZipFile: |
          // Placeholder — deploy actual code via CI/CD
          exports.handler = async (event) => ({ statusCode: 200, body: '{}' });
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
          - !Ref MSKSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable

  MetricsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MSKLoadSim-Metrics
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          // Placeholder — deploy actual code via CI/CD
          exports.handler = async (event) => ({ statusCode: 200, body: '{}' });
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
          - !Ref MSKSecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          SESSION_TABLE: !Ref SessionTable

  # ============================================================
  # API Gateway
  # ============================================================
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MSKLoadSimAPI
      Description: API for MSK Load Simulation Tool
      EndpointConfiguration:
        Types:
          - REGIONAL

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuth
      Type: COGNITO_USER_POOLS
      RestApiId: !Ref ApiGateway
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - Fn::ImportValue: !Sub '${CognitoStackName}-UserPoolArn'

  # Cluster endpoints
  ClusterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: cluster

  ClusterTestResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ClusterResource
      PathPart: test

  ClusterTestMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ClusterTestResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ControlFunction.Arn}/invocations'

  # Topics endpoint
  TopicsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: topics

  TopicsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref TopicsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ControlFunction.Arn}/invocations'

  # Producer endpoint
  ProducerResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: producer

  ProducerStartResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ProducerResource
      PathPart: start

  ProducerStartMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ProducerStartResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProducerFunction.Arn}/invocations'

  # Consumer endpoint
  ConsumerResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: consumer

  ConsumerStartResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ConsumerResource
      PathPart: start

  ConsumerStartMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ConsumerStartResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConsumerFunction.Arn}/invocations'

  # Metrics endpoint
  MetricsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: metrics

  MetricsGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref MetricsResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MetricsFunction.Arn}/invocations'

  # API Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ClusterTestMethod
      - TopicsGetMethod
      - ProducerStartMethod
      - ConsumerStartMethod
      - MetricsGetMethod
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  # Lambda permissions for API Gateway
  ControlFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ControlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  ProducerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProducerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  ConsumerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConsumerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  MetricsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # ============================================================
  # CloudWatch Dashboard
  # ============================================================
  MSKDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: MSK-Load-Simulator
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Messages Produced",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "MSKLoadSim-Producer"]
                ],
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "MSKLoadSim-Producer"],
                  ["AWS/Lambda", "Errors", "FunctionName", "MSKLoadSim-Consumer"],
                  ["AWS/Lambda", "Errors", "FunctionName", "MSKLoadSim-Control"]
                ],
                "region": "${AWS::Region}",
                "period": 60
              }
            }
          ]
        }

Outputs:
  CloudFrontURL:
    Description: URL for the MSK Load Simulation Tool
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'

  WebBucketName:
    Description: S3 bucket for web assets
    Value: !Ref WebBucket

  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Fn::ImportValue: !Sub '${CognitoStackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value:
      Fn::ImportValue: !Sub '${CognitoStackName}-UserPoolClientId'
